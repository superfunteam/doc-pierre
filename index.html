  <style>
    :root {
      --bg: #1a1a1a;
      --card-bg: #f8efd9;
      --ink: #1a2545;
      --shadow: rgba(0,0,0,0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #fff;
    }
    body {
      display: grid;
      place-items: center;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }
    #stage {
      width: 100%;
      height: 100%;
      perspective: 1200px;
      display: grid;
      place-items: center;
    }
    .deck {
      position: relative;
      width: min(75vw, 360px);
      aspect-ratio: 2.5 / 3.5;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
    }
    .card {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: 0 8px 24px var(--shadow);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }
    /* The two faces are the leaf nodes: they own the backface-hiding and the
       content clipping. The rotating .card MUST stay a clean preserve-3d shell —
       any overflow!=visible or backface-visibility on it flattens/culls the 3D
       context and the front face never presents. */
    .card .face,
    .card .back {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card .back {
      background: var(--card-bg) center/cover no-repeat url('card-back.png');
      transform: rotateY(0deg);
    }
    .card .face {
      background: var(--card-bg);
      transform: rotateY(180deg);
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 24px 22px;
      color: var(--ink);
    }
    .card .face .badge {
      align-self: start;
      justify-self: start;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      background: #555;
      color: #fff;
    }
    .card .face .badge[data-category="Work"]         { background: #E94B3C; }
    .card .face .badge[data-category="Family"]       { background: #2D4FA0; }
    .card .face .badge[data-category="Friend Group"] { background: #F4C84A; color: #1a2545; }
    .card .face .badge[data-category="Travel"]       { background: #3CA39E; }
    .card .face .badge[data-category="Just For Fun"] { background: #E66A9E; }
    .card .face .prompt {
      align-self: center;
      margin: 0;
      font-family: 'Instrument Serif', Georgia, 'Times New Roman', serif;
      font-size: clamp(27px, 7vw, 38px);
      line-height: 1.2;
      font-weight: 400;
      text-align: center;
      color: var(--ink);
    }
    .card .face .prompt em {
      font-style: italic;
      color: #E94B3C;
    }
    .card .face .footer {
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.6;
      color: var(--ink);
    }
    .card .face .footer svg { width: 19px; height: auto; display: block; }
    /* Stack depth: each layer shifted + slightly scaled */
    .card.layer-0 { transform: translate3d(0, 0px, 0); }
    .card.layer-1 { transform: translate3d(2px, 3px, -2px); }
    .card.layer-2 { transform: translate3d(4px, 6px, -4px); }
    .card.layer-3 { transform: translate3d(6px, 9px, -6px); }
    .card.layer-4 { transform: translate3d(8px, 12px, -8px); }
    .card.layer-5 { transform: translate3d(10px, 15px, -10px); opacity: 0.95; }
    .card.revealed { touch-action: none; cursor: grab; }
    .card.revealed:active { cursor: grabbing; }

    /* ---- Category FAB ---- */
    .fab {
      position: fixed;
      right: calc(18px + env(safe-area-inset-right, 0px));
      bottom: calc(18px + var(--safe-bottom));
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      opacity: 0.30;
      display: grid; place-items: center;
      z-index: 60;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: opacity .25s ease, transform .18s ease, border-color .25s ease;
      cursor: pointer;
      touch-action: manipulation;
    }
    .fab:active { transform: scale(0.92); opacity: 0.95; }
    .fab.has-filter { opacity: 0.92; }
    .fab svg { width: 23px; height: 23px; display: block; }
    .fab .fab-dot {
      position: absolute; top: -1px; right: -1px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--bg);
      display: none;
    }
    .fab.has-filter .fab-dot { display: block; }

    /* ---- Category picker: a card that swings in on a wheel from the corner ---- */
    .picker-overlay {
      position: fixed; inset: 0;
      z-index: 120;
      display: grid; place-items: center;
      background: rgba(8,10,18,0);
    }
    .picker-overlay[hidden] { display: none; }
    .picker-card {
      position: relative;
      width: min(82vw, 360px);
      max-height: 86vh;
      overflow-y: auto;
      background: var(--card-bg);
      color: var(--ink);
      border-radius: 22px;
      box-shadow: 0 26px 70px rgba(0,0,0,0.6);
      padding: 24px 20px 14px;
      transform-origin: 100% 100%; /* pivot at bottom-right (by the FAB) = wheel-in from the corner */
      will-change: transform, opacity;
    }
    .picker-title {
      text-align: center;
      font-size: 12px; letter-spacing: 0.30em; text-transform: uppercase;
      font-weight: 800;
      color: rgba(26,37,69,0.5);
      margin-bottom: 18px;
    }
    .picker-list { display: flex; flex-direction: column; gap: 10px; }
    .cat-row {
      position: relative;
      border: none; border-radius: 15px;
      padding: 16px 20px;
      font-family: inherit;
      font-weight: 800; font-size: 16px;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: #fff; text-align: left;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(0,0,0,0.18);
      transition: transform .12s ease;
    }
    .cat-row:active { transform: scale(0.97); }
    .cat-row.all { background: #ece2c8; color: var(--ink); box-shadow: inset 0 0 0 1.5px rgba(26,37,69,0.18); }
    .cat-row.is-active { box-shadow: 0 0 0 3px var(--ink), 0 5px 14px rgba(0,0,0,0.2); }
    .cat-row .check {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%) scale(0);
      font-weight: 900; font-size: 17px;
      transition: transform .2s cubic-bezier(.2,1.4,.4,1);
    }
    .cat-row.is-active .check { transform: translateY(-50%) scale(1); }
    .picker-cancel {
      display: block; margin: 16px auto 4px;
      background: none; border: none;
      color: rgba(26,37,69,0.55);
      font-family: inherit;
      font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module">
    import gsap from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm';
    import { parseCSV, renderProminent, Deck } from './deck.js';

    const csvText = await fetch('questions.csv').then(r => r.text());
    const rows = parseCSV(csvText);
    const allCards = rows.map(r => ({ category: r.Category, question: r.Prompt }));
    const CATEGORIES = [...new Set(allCards.map(c => c.category))];
    const CAT_COLORS = {
      'Work': '#E94B3C', 'Family': '#2D4FA0', 'Friend Group': '#F4C84A',
      'Travel': '#3CA39E', 'Just For Fun': '#E66A9E',
    };
    let activeCategory = null;            // null = draw from all categories
    let deckState = new Deck(allCards);
    function setCategory(cat) {
      activeCategory = cat;
      const pool = cat ? allCards.filter(c => c.category === cat) : allCards;
      deckState = new Deck(pool);
      updateFab();
    }

    const SOUND_COUNT = 11;
    const sounds = [];
    for (let i = 1; i <= SOUND_COUNT; i++) {
      const a = new Audio(`sounds/sound${String(i).padStart(5, '0')}.mp3`);
      a.preload = 'auto';
      a.volume = 1.0;
      sounds.push(a);
    }
    let lastSoundIdx = -1;
    function playDrawSound() {
      if (!sounds.length) return;
      let idx = Math.floor(Math.random() * sounds.length);
      if (sounds.length > 1 && idx === lastSoundIdx) {
        idx = (idx + 1) % sounds.length;
      }
      lastSoundIdx = idx;
      const a = sounds[idx];
      try {
        a.pause();
        a.currentTime = 0;
        a.volume = 1.0;
        const p = a.play();
        if (p && typeof p.catch === 'function') p.catch(() => {});
      } catch {}
    }

    const stage = document.getElementById('stage');
    const deck = document.createElement('div');
    deck.className = 'deck';
    stage.appendChild(deck);

    const STACK_DEPTH = 6;
    for (let i = STACK_DEPTH - 1; i >= 0; i--) {
      const card = document.createElement('div');
      card.className = `card layer-${i}`;
      card.innerHTML = `<div class="back"></div><div class="face"></div>`;
      deck.appendChild(card);
    }

    const topCard = deck.querySelector('.card.layer-0');
    gsap.set(topCard, { x: 0, y: 0, z: 0 });
    gsap.to(topCard, {
      y: -4, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1,
    });

    const GROUP_CHAT_MARK = `<svg viewBox="0 0 178 128" fill="none" aria-hidden="true"><g style="mix-blend-mode:multiply"><path d="M14.3068 23.8002C-2.81674 45.6629 1.38031 83.9161 14.3064 94.0521C41.5986 115.453 89.6101 101.963 133.615 99.1689C167.856 96.9946 178.891 55.632 172.732 35.7394C160.684 -3.1727 34.906 -2.50011 14.3068 23.8002Z" fill="#E54447"/><path d="M131.115 93.5019C131.115 93.5019 98.8215 117.227 86.2678 124.778C84.1218 126.069 82.517 124.619 83.3672 122.345L96.9624 85.99" fill="#E54447"/></g></svg>`;
    function paintFace(cardEl, card) {
      const face = cardEl.querySelector('.face');
      face.innerHTML = `
        <div class="badge" data-category="${escapeAttr(card.category)}">${escapeAttr(card.category)}</div>
        <p class="prompt">${renderProminent(card.question)}</p>
        <div class="footer">${GROUP_CHAT_MARK}<span>Group Chat</span></div>
      `;
    }
    function escapeAttr(s) {
      return s.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    let isAnimating = false;
    let revealed = null; // current face-up card element when one exists
    let pickerOpen = false; // category picker overlay is open

    function promoteStack() {
      // Every card moves up one layer. Layer 0 (currently flying off) is being handled separately.
      const cards = [...deck.querySelectorAll('.card')];
      cards.forEach(c => {
        const m = c.className.match(/layer-(\d+)/);
        if (!m) return;
        const n = parseInt(m[1], 10);
        if (n === 0) return;
        c.classList.replace(`layer-${n}`, `layer-${n - 1}`);
      });
      // Add a new bottom card to keep the stack at 6.
      const tail = document.createElement('div');
      tail.className = `card layer-${STACK_DEPTH - 1}`;
      tail.innerHTML = `<div class="back"></div><div class="face"></div>`;
      deck.insertBefore(tail, deck.firstChild);
    }

    function flipTopCard() {
      if (isAnimating || revealed || pickerOpen) return;
      isAnimating = true;
      playDrawSound();

      const card = deck.querySelector('.card.layer-0');
      gsap.killTweensOf(card); // stop idle breath
      card.classList.remove('layer-0');
      card.style.zIndex = 100;

      const next = deckState.next();
      paintFace(card, next);

      const tl = gsap.timeline({ onComplete: () => { isAnimating = false; revealed = card; card.classList.add('revealed'); } });
      // One continuous motion: the card rotates the WHOLE time it rises and settles.
      // The lift is a single up-and-back arc whose apex (biggest, ~edge-on) lands on
      // the flip's midpoint, so the spin and the pop read as one gesture, not three.
      const FLIP = 0.7;
      tl.to(card, { rotationY: 180, duration: FLIP, ease: 'power2.inOut' }, 0);
      tl.to(card, {
        keyframes: [
          { y: -72, z: 90, scale: 1.18, duration: FLIP / 2, ease: 'power2.out' },
          { y: 0, z: 40, scale: 1.0, duration: FLIP / 2, ease: 'power2.inOut' },
        ],
      }, 0);

      promoteStack();
      // Restart breath on the new top card.
      const newTop = deck.querySelector('.card.layer-0');
      gsap.set(newTop, { x: 0, y: 0, z: 0 });
      gsap.to(newTop, { y: -4, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1 });
    }

    deck.addEventListener('pointerdown', (e) => {
      primeMotionPermission(); // fire-and-forget; only meaningful first time
      // Only the topmost (z-elevated or layer-0) card triggers.
      const card = e.target.closest('.card');
      if (!card) return;
      if (!card.classList.contains('layer-0')) return;
      flipTopCard();
    });

    let drag = null;

    deck.addEventListener('pointerdown', (e) => {
      if (!revealed) return;
      const card = e.target.closest('.card.revealed');
      if (!card) return;
      card.setPointerCapture(e.pointerId);
      drag = {
        pointerId: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        lastX: e.clientX,
        lastY: e.clientY,
        lastT: performance.now(),
        vx: 0, vy: 0,
      };
      gsap.killTweensOf(card);
    });

    deck.addEventListener('pointermove', (e) => {
      if (!drag || e.pointerId !== drag.pointerId || !revealed) return;
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      const now = performance.now();
      const dt = Math.max(1, now - drag.lastT);
      drag.vx = (e.clientX - drag.lastX) / dt;
      drag.vy = (e.clientY - drag.lastY) / dt;
      drag.lastX = e.clientX; drag.lastY = e.clientY; drag.lastT = now;
      const rot = Math.max(-20, Math.min(20, dx * 0.06));
      gsap.set(revealed, { x: dx, y: dy, rotation: rot, rotationY: 180 });
    });

    function endDrag(e) {
      if (!drag || (e && e.pointerId !== drag.pointerId) || !revealed) return;
      const dx = drag.lastX - drag.startX;
      const dy = drag.lastY - drag.startY;
      const speed = Math.hypot(drag.vx, drag.vy); // px/ms
      const distance = Math.hypot(dx, dy);
      const threshold = Math.min(window.innerWidth, window.innerHeight) * 0.30;
      const fling = speed > 0.6;

      const card = revealed;
      drag = null;

      if (distance > threshold || fling) {
        // Dismiss in the direction of travel.
        const angle = Math.atan2(dy, dx);
        const flyDist = Math.max(window.innerWidth, window.innerHeight) * 1.4;
        const tx = Math.cos(angle) * flyDist;
        const ty = Math.sin(angle) * flyDist;
        const spin = (dx >= 0 ? 1 : -1) * (180 + Math.random() * 90);
        gsap.to(card, {
          x: tx, y: ty, rotation: spin, duration: 0.45, ease: 'power2.in',
          onComplete: () => { card.remove(); revealed = null; },
        });
      } else if (distance < 12) {
        // Negligible movement = a tap. Some players won't discover the swipe, so a tap
        // dismisses too — animated as an automatic swipe-out to the side.
        const flyDist = Math.max(window.innerWidth, window.innerHeight) * 1.4;
        gsap.to(card, {
          x: flyDist, y: flyDist * (0.05 + Math.random() * 0.22), rotation: 200 + Math.random() * 80,
          duration: 0.5, ease: 'power2.in',
          onComplete: () => { card.remove(); revealed = null; },
        });
      } else {
        gsap.to(card, {
          x: 0, y: 0, rotation: 0, duration: 0.45, ease: 'elastic.out(1, 0.6)',
        });
      }
    }

    deck.addEventListener('pointerup', endDrag);
    deck.addEventListener('pointercancel', endDrag);

    let motionPermissionRequested = false;
    async function primeMotionPermission() {
      if (motionPermissionRequested) return;
      motionPermissionRequested = true;
      const DM = window.DeviceMotionEvent;
      if (DM && typeof DM.requestPermission === 'function') {
        try { await DM.requestPermission(); } catch {}
      }
    }

    let lastShake = 0;
    window.addEventListener('devicemotion', (e) => {
      if (pickerOpen) return;
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a) return;
      const mag = Math.hypot(a.x || 0, a.y || 0, a.z || 0);
      // Resting magnitude with gravity ≈ 9.8. Shake threshold ≈ 22.
      if (mag > 22 && performance.now() - lastShake > 800) {
        lastShake = performance.now();
        if (revealed) {
          // Dismiss the current card in a random direction, then it'll be ready for the next tap.
          const card = revealed;
          const dir = Math.random() < 0.5 ? -1 : 1;
          revealed = null;
          gsap.to(card, {
            x: dir * window.innerWidth * 1.2,
            rotation: dir * 180,
            duration: 0.4, ease: 'power2.in',
            onComplete: () => card.remove(),
          });
        } else if (!isAnimating) {
          flipTopCard();
        }
      }
    });

    /* ---------- Category FAB + clockface picker ---------- */
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.setAttribute('aria-label', 'Choose category');
    fab.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/>
        <rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/>
      </svg>
      <span class="fab-dot"></span>`;
    document.body.appendChild(fab);

    function updateFab() {
      const dot = fab.querySelector('.fab-dot');
      if (activeCategory) {
        fab.classList.add('has-filter');
        const c = CAT_COLORS[activeCategory] || '#fff';
        fab.style.borderColor = c;
        dot.style.background = c;
      } else {
        fab.classList.remove('has-filter');
        fab.style.borderColor = '';
      }
    }

    const overlay = document.createElement('div');
    overlay.className = 'picker-overlay';
    overlay.hidden = true;
    overlay.innerHTML = `<div class="picker-card"><div class="picker-title">Pick a vibe</div><div class="picker-list"></div><button class="picker-cancel">Cancel</button></div>`;
    document.body.appendChild(overlay);
    const pickerCard = overlay.querySelector('.picker-card');
    const pickerList = overlay.querySelector('.picker-list');
    const cancelBtn = overlay.querySelector('.picker-cancel');

    // "All" row (clears the filter) + one tinted row per category.
    function makeRow(label, cat, isAll) {
      const el = document.createElement('button');
      el.className = 'cat-row' + (isAll ? ' all' : '');
      el.dataset.cat = cat || '';
      el.innerHTML = `<span>${label}</span><span class="check">✓</span>`;
      if (!isAll) {
        el.style.background = CAT_COLORS[cat] || '#555';
        if (cat === 'Friend Group') el.style.color = '#1a2545';
      }
      pickerList.appendChild(el);
    }
    makeRow('All Categories', null, true);
    CATEGORIES.forEach(cat => makeRow(cat, cat, false));

    function markActiveRows() {
      [...pickerList.children].forEach(el =>
        el.classList.toggle('is-active', (el.dataset.cat || null) === activeCategory));
    }

    // Wheel-in: the card pivots up out of the bottom-right corner (by the FAB) and springs to centre.
    const TUCKED = { rotation: 68, scale: 0.45, autoAlpha: 0, xPercent: 26, yPercent: 58 };
    const SEATED = { rotation: 0, scale: 1, autoAlpha: 1, xPercent: 0, yPercent: 0 };

    function openPicker() {
      if (pickerOpen) return;
      pickerOpen = true;
      overlay.hidden = false;
      markActiveRows();
      gsap.killTweensOf([overlay, pickerCard]);
      gsap.to(overlay, { backgroundColor: 'rgba(8,10,18,0.6)', duration: 0.32, ease: 'power2.out' });
      gsap.fromTo(pickerCard, TUCKED, { ...SEATED, duration: 0.62, ease: 'back.out(1.5)' });
    }

    function closePicker() {
      if (!pickerOpen) return;
      pickerOpen = false;
      gsap.killTweensOf([overlay, pickerCard]);
      gsap.to(overlay, { backgroundColor: 'rgba(8,10,18,0)', duration: 0.3, ease: 'power2.in' });
      gsap.to(pickerCard, { ...TUCKED, duration: 0.42, ease: 'back.in(1.5)', onComplete: () => { overlay.hidden = true; } });
    }

    fab.addEventListener('click', () => { pickerOpen ? closePicker() : openPicker(); });
    cancelBtn.addEventListener('click', () => closePicker());
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePicker(); }); // backdrop tap = cancel
    pickerList.addEventListener('click', (e) => {
      const row = e.target.closest('.cat-row');
      if (!row) return;
      const cat = row.dataset.cat ? row.dataset.cat : null;
      setCategory(cat);
      markActiveRows();
      gsap.fromTo(row, { scale: 1 }, { scale: 1.05, duration: 0.1, yoyo: true, repeat: 1, ease: 'power2.out', onComplete: () => closePicker() });
    });

    updateFab();
  </script>
</body>
</html>
