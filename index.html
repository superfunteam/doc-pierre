<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Doc Pierre's Group Chat</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --card-bg: #f8efd9;
      --ink: #1a2545;
      --shadow: rgba(0,0,0,0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #fff;
    }
    body {
      display: grid;
      place-items: center;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }
    #stage {
      width: 100%;
      height: 100%;
      perspective: 1200px;
      display: grid;
      place-items: center;
    }
    .deck {
      position: relative;
      width: min(75vw, 360px);
      aspect-ratio: 2.5 / 3.5;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
    }
    .card {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: var(--card-bg);
      box-shadow: 0 8px 24px var(--shadow);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }
    /* The two faces are the leaf nodes: they own the backface-hiding and the
       content clipping. The rotating .card MUST stay a clean preserve-3d shell —
       any overflow!=visible or backface-visibility on it flattens/culls the 3D
       context and the front face never presents. */
    .card .face,
    .card .back {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card .back {
      background: var(--card-bg) center/cover no-repeat url('card-back.png');
      transform: rotateY(0deg);
    }
    .card .face {
      background: var(--card-bg);
      transform: rotateY(180deg);
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 24px 22px;
      color: var(--ink);
    }
    .card .face .badge {
      align-self: start;
      justify-self: start;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
      background: #555;
      color: #fff;
    }
    .card .face .badge[data-category="Work"]         { background: #E94B3C; }
    .card .face .badge[data-category="Family"]       { background: #2D4FA0; }
    .card .face .badge[data-category="Friend Group"] { background: #F4C84A; color: #1a2545; }
    .card .face .badge[data-category="Travel"]       { background: #3CA39E; }
    .card .face .badge[data-category="Just For Fun"] { background: #E66A9E; }
    .card .face .prompt {
      align-self: center;
      margin: 0;
      font-size: clamp(20px, 5.2vw, 28px);
      line-height: 1.25;
      font-weight: 600;
      text-align: center;
      color: var(--ink);
    }
    .card .face .prompt em {
      font-style: italic;
      color: #E94B3C;
    }
    .card .face .footer {
      align-self: center;
      font-size: 10px;
      letter-spacing: 0.18em;
      opacity: 0.55;
      color: var(--ink);
    }
    /* Stack depth: each layer shifted + slightly scaled */
    .card.layer-0 { transform: translate3d(0, 0px, 0); }
    .card.layer-1 { transform: translate3d(2px, 3px, -2px); }
    .card.layer-2 { transform: translate3d(4px, 6px, -4px); }
    .card.layer-3 { transform: translate3d(6px, 9px, -6px); }
    .card.layer-4 { transform: translate3d(8px, 12px, -8px); }
    .card.layer-5 { transform: translate3d(10px, 15px, -10px); opacity: 0.95; }
    .card.revealed { touch-action: none; cursor: grab; }
    .card.revealed:active { cursor: grabbing; }

    /* ---- Category FAB ---- */
    .fab {
      position: fixed;
      right: calc(18px + env(safe-area-inset-right, 0px));
      bottom: calc(18px + var(--safe-bottom));
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      opacity: 0.30;
      display: grid; place-items: center;
      z-index: 60;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: opacity .25s ease, transform .18s ease, border-color .25s ease;
      cursor: pointer;
      touch-action: manipulation;
    }
    .fab:active { transform: scale(0.92); opacity: 0.95; }
    .fab.has-filter { opacity: 0.92; }
    .fab svg { width: 23px; height: 23px; display: block; }
    .fab .fab-dot {
      position: absolute; top: -1px; right: -1px;
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--bg);
      display: none;
    }
    .fab.has-filter .fab-dot { display: block; }

    /* ---- Category picker (clockface) ---- */
    .picker-overlay {
      position: fixed; inset: 0;
      z-index: 120;
      display: grid; place-items: center;
      background: rgba(8,10,18,0);
      perspective: 1000px;
    }
    .picker-overlay[hidden] { display: none; }
    .picker-title {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 9%);
      left: 0; right: 0;
      text-align: center;
      font-size: 12px; letter-spacing: 0.34em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      font-weight: 700;
    }
    .picker {
      position: relative;
      width: 260px; height: 260px;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }
    .cat-chip {
      position: absolute;
      left: 50%; top: 50%;
      margin: 0;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      font-family: inherit;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #fff;
      box-shadow: 0 8px 22px rgba(0,0,0,0.45);
      cursor: pointer;
      will-change: transform, opacity;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    .cat-chip.is-active { outline: 3px solid #fff; outline-offset: 2px; }
    .center-chip {
      background: var(--card-bg);
      color: var(--ink);
      box-shadow: 0 10px 26px rgba(0,0,0,0.5);
      z-index: 3;
    }
    .picker-cancel {
      position: fixed;
      left: 50%;
      bottom: calc(46px + var(--safe-bottom));
      transform: translateX(-50%);
      border: none;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-family: inherit;
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      padding: 12px 30px; border-radius: 999px;
      z-index: 121;
      cursor: pointer;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module">
    import gsap from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm';
    import { parseCSV, renderProminent, Deck } from './deck.js';

    const csvText = await fetch('questions.csv').then(r => r.text());
    const rows = parseCSV(csvText);
    const allCards = rows.map(r => ({ category: r.Category, question: r.Prompt }));
    const CATEGORIES = [...new Set(allCards.map(c => c.category))];
    const CAT_COLORS = {
      'Work': '#E94B3C', 'Family': '#2D4FA0', 'Friend Group': '#F4C84A',
      'Travel': '#3CA39E', 'Just For Fun': '#E66A9E',
    };
    let activeCategory = null;            // null = draw from all categories
    let deckState = new Deck(allCards);
    function setCategory(cat) {
      activeCategory = cat;
      const pool = cat ? allCards.filter(c => c.category === cat) : allCards;
      deckState = new Deck(pool);
      updateFab();
    }

    const SOUND_COUNT = 11;
    const sounds = [];
    for (let i = 1; i <= SOUND_COUNT; i++) {
      const a = new Audio(`sounds/sound${String(i).padStart(5, '0')}.mp3`);
      a.preload = 'auto';
      a.volume = 1.0;
      sounds.push(a);
    }
    let lastSoundIdx = -1;
    function playDrawSound() {
      if (!sounds.length) return;
      let idx = Math.floor(Math.random() * sounds.length);
      if (sounds.length > 1 && idx === lastSoundIdx) {
        idx = (idx + 1) % sounds.length;
      }
      lastSoundIdx = idx;
      const a = sounds[idx];
      try {
        a.pause();
        a.currentTime = 0;
        a.volume = 1.0;
        const p = a.play();
        if (p && typeof p.catch === 'function') p.catch(() => {});
      } catch {}
    }

    const stage = document.getElementById('stage');
    const deck = document.createElement('div');
    deck.className = 'deck';
    stage.appendChild(deck);

    const STACK_DEPTH = 6;
    for (let i = STACK_DEPTH - 1; i >= 0; i--) {
      const card = document.createElement('div');
      card.className = `card layer-${i}`;
      card.innerHTML = `<div class="back"></div><div class="face"></div>`;
      deck.appendChild(card);
    }

    const topCard = deck.querySelector('.card.layer-0');
    gsap.set(topCard, { x: 0, y: 0, z: 0 });
    gsap.to(topCard, {
      y: -4, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1,
    });

    function paintFace(cardEl, card) {
      const face = cardEl.querySelector('.face');
      face.innerHTML = `
        <div class="badge" data-category="${escapeAttr(card.category)}">${escapeAttr(card.category)}</div>
        <p class="prompt">${renderProminent(card.question)}</p>
        <div class="footer">DOC PIERRE'S GROUP CHAT</div>
      `;
    }
    function escapeAttr(s) {
      return s.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    let isAnimating = false;
    let revealed = null; // current face-up card element when one exists
    let pickerOpen = false; // category picker overlay is open

    function promoteStack() {
      // Every card moves up one layer. Layer 0 (currently flying off) is being handled separately.
      const cards = [...deck.querySelectorAll('.card')];
      cards.forEach(c => {
        const m = c.className.match(/layer-(\d+)/);
        if (!m) return;
        const n = parseInt(m[1], 10);
        if (n === 0) return;
        c.classList.replace(`layer-${n}`, `layer-${n - 1}`);
      });
      // Add a new bottom card to keep the stack at 6.
      const tail = document.createElement('div');
      tail.className = `card layer-${STACK_DEPTH - 1}`;
      tail.innerHTML = `<div class="back"></div><div class="face"></div>`;
      deck.insertBefore(tail, deck.firstChild);
    }

    function flipTopCard() {
      if (isAnimating || revealed || pickerOpen) return;
      isAnimating = true;
      playDrawSound();

      const card = deck.querySelector('.card.layer-0');
      gsap.killTweensOf(card); // stop idle breath
      card.classList.remove('layer-0');
      card.style.zIndex = 100;

      const next = deckState.next();
      paintFace(card, next);

      const tl = gsap.timeline({ onComplete: () => { isAnimating = false; revealed = card; card.classList.add('revealed'); } });
      // Snappier, bigger pop: launch high+close fast, whip the flip, land with a spring overshoot.
      tl.to(card, { y: -72, z: 90, scale: 1.18, duration: 0.20, ease: 'power3.out' }, 0);
      tl.to(card, { rotationY: 180, duration: 0.42, ease: 'power3.inOut' }, 0.03);
      tl.to(card, { y: 0, z: 40, scale: 1.0, duration: 0.38, ease: 'back.out(2)' }, 0.40);

      promoteStack();
      // Restart breath on the new top card.
      const newTop = deck.querySelector('.card.layer-0');
      gsap.set(newTop, { x: 0, y: 0, z: 0 });
      gsap.to(newTop, { y: -4, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1 });
    }

    deck.addEventListener('pointerdown', (e) => {
      primeMotionPermission(); // fire-and-forget; only meaningful first time
      // Only the topmost (z-elevated or layer-0) card triggers.
      const card = e.target.closest('.card');
      if (!card) return;
      if (!card.classList.contains('layer-0')) return;
      flipTopCard();
    });

    let drag = null;

    deck.addEventListener('pointerdown', (e) => {
      if (!revealed) return;
      const card = e.target.closest('.card.revealed');
      if (!card) return;
      card.setPointerCapture(e.pointerId);
      drag = {
        pointerId: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        lastX: e.clientX,
        lastY: e.clientY,
        lastT: performance.now(),
        vx: 0, vy: 0,
      };
      gsap.killTweensOf(card);
    });

    deck.addEventListener('pointermove', (e) => {
      if (!drag || e.pointerId !== drag.pointerId || !revealed) return;
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      const now = performance.now();
      const dt = Math.max(1, now - drag.lastT);
      drag.vx = (e.clientX - drag.lastX) / dt;
      drag.vy = (e.clientY - drag.lastY) / dt;
      drag.lastX = e.clientX; drag.lastY = e.clientY; drag.lastT = now;
      const rot = Math.max(-20, Math.min(20, dx * 0.06));
      gsap.set(revealed, { x: dx, y: dy, rotation: rot, rotationY: 180 });
    });

    function endDrag(e) {
      if (!drag || (e && e.pointerId !== drag.pointerId) || !revealed) return;
      const dx = drag.lastX - drag.startX;
      const dy = drag.lastY - drag.startY;
      const speed = Math.hypot(drag.vx, drag.vy); // px/ms
      const distance = Math.hypot(dx, dy);
      const threshold = Math.min(window.innerWidth, window.innerHeight) * 0.30;
      const fling = speed > 0.6;

      const card = revealed;
      drag = null;

      if (distance > threshold || fling) {
        // Dismiss in the direction of travel.
        const angle = Math.atan2(dy, dx);
        const flyDist = Math.max(window.innerWidth, window.innerHeight) * 1.4;
        const tx = Math.cos(angle) * flyDist;
        const ty = Math.sin(angle) * flyDist;
        const spin = (dx >= 0 ? 1 : -1) * (180 + Math.random() * 90);
        gsap.to(card, {
          x: tx, y: ty, rotation: spin, duration: 0.45, ease: 'power2.in',
          onComplete: () => { card.remove(); revealed = null; },
        });
      } else {
        gsap.to(card, {
          x: 0, y: 0, rotation: 0, duration: 0.45, ease: 'elastic.out(1, 0.6)',
        });
      }
    }

    deck.addEventListener('pointerup', endDrag);
    deck.addEventListener('pointercancel', endDrag);

    let motionPermissionRequested = false;
    async function primeMotionPermission() {
      if (motionPermissionRequested) return;
      motionPermissionRequested = true;
      const DM = window.DeviceMotionEvent;
      if (DM && typeof DM.requestPermission === 'function') {
        try { await DM.requestPermission(); } catch {}
      }
    }

    let lastShake = 0;
    window.addEventListener('devicemotion', (e) => {
      if (pickerOpen) return;
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a) return;
      const mag = Math.hypot(a.x || 0, a.y || 0, a.z || 0);
      // Resting magnitude with gravity ≈ 9.8. Shake threshold ≈ 22.
      if (mag > 22 && performance.now() - lastShake > 800) {
        lastShake = performance.now();
        if (revealed) {
          // Dismiss the current card in a random direction, then it'll be ready for the next tap.
          const card = revealed;
          const dir = Math.random() < 0.5 ? -1 : 1;
          revealed = null;
          gsap.to(card, {
            x: dir * window.innerWidth * 1.2,
            rotation: dir * 180,
            duration: 0.4, ease: 'power2.in',
            onComplete: () => card.remove(),
          });
        } else if (!isAnimating) {
          flipTopCard();
        }
      }
    });

    /* ---------- Category FAB + clockface picker ---------- */
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.setAttribute('aria-label', 'Choose category');
    fab.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/>
        <rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/>
      </svg>
      <span class="fab-dot"></span>`;
    document.body.appendChild(fab);

    function updateFab() {
      const dot = fab.querySelector('.fab-dot');
      if (activeCategory) {
        fab.classList.add('has-filter');
        const c = CAT_COLORS[activeCategory] || '#fff';
        fab.style.borderColor = c;
        dot.style.background = c;
      } else {
        fab.classList.remove('has-filter');
        fab.style.borderColor = '';
      }
    }

    const overlay = document.createElement('div');
    overlay.className = 'picker-overlay';
    overlay.hidden = true;
    overlay.innerHTML = `<div class="picker-title">Pick a vibe</div><div class="picker"></div><button class="picker-cancel">Cancel</button>`;
    document.body.appendChild(overlay);
    const picker = overlay.querySelector('.picker');
    const cancelBtn = overlay.querySelector('.picker-cancel');

    // A center "All" chip (clears the filter) plus one chip per category, arranged radially.
    const chips = [];
    const centerChip = document.createElement('button');
    centerChip.className = 'cat-chip center-chip';
    centerChip.textContent = 'All';
    centerChip.dataset.cat = '';
    picker.appendChild(centerChip);
    chips.push({ el: centerChip, cat: null, x: 0, y: 0 });

    const R = Math.min(118, window.innerWidth * 0.30);
    CATEGORIES.forEach((cat, i) => {
      const ang = (-90 + i * (360 / CATEGORIES.length)) * Math.PI / 180;
      const el = document.createElement('button');
      el.className = 'cat-chip';
      el.textContent = cat;
      el.dataset.cat = cat;
      el.style.background = CAT_COLORS[cat] || '#555';
      if (cat === 'Friend Group') el.style.color = '#1a2545';
      picker.appendChild(el);
      chips.push({ el, cat, x: Math.cos(ang) * R, y: Math.sin(ang) * R });
    });

    function openPicker() {
      if (pickerOpen) return;
      pickerOpen = true;
      overlay.hidden = false;
      chips.forEach(c => c.el.classList.toggle('is-active', (c.cat || null) === activeCategory));
      gsap.killTweensOf([picker, overlay, cancelBtn, ...chips.map(c => c.el)]);
      gsap.to(overlay, { backgroundColor: 'rgba(8,10,18,0.62)', duration: 0.35, ease: 'power2.out' });
      // The clockface sweeps in with a rotational spring...
      gsap.fromTo(picker, { rotation: -150, scale: 0.2 }, { rotation: 0, scale: 1, duration: 0.62, ease: 'back.out(1.5)' });
      // ...while each chip flies to its clock position and flips edge -> face (face-first), staggered.
      chips.forEach((c, i) => {
        gsap.fromTo(c.el,
          { x: 0, y: 0, xPercent: -50, yPercent: -50, rotationY: 90, opacity: 0, scale: 0.5 },
          { x: c.x, y: c.y, rotationY: 0, opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(2)', delay: 0.08 + i * 0.05 });
      });
      gsap.fromTo(cancelBtn, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.3, delay: 0.32 });
    }

    function closePicker() {
      if (!pickerOpen) return;
      pickerOpen = false;
      gsap.killTweensOf([picker, overlay, cancelBtn, ...chips.map(c => c.el)]);
      gsap.to(overlay, { backgroundColor: 'rgba(8,10,18,0)', duration: 0.32, ease: 'power2.in' });
      gsap.to(cancelBtn, { opacity: 0, y: 20, duration: 0.2 });
      // Spin back out, face away.
      chips.forEach((c, i) => {
        gsap.to(c.el, { x: 0, y: 0, rotationY: -90, opacity: 0, scale: 0.5, duration: 0.34, ease: 'back.in(1.6)', delay: i * 0.03 });
      });
      gsap.to(picker, {
        rotation: 150, scale: 0.2, duration: 0.4, ease: 'back.in(1.4)', delay: 0.05,
        onComplete: () => { overlay.hidden = true; },
      });
    }

    fab.addEventListener('click', () => { pickerOpen ? closePicker() : openPicker(); });
    cancelBtn.addEventListener('click', () => closePicker());
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePicker(); }); // backdrop tap = cancel
    picker.addEventListener('click', (e) => {
      const chip = e.target.closest('.cat-chip');
      if (!chip) return;
      const cat = chip.dataset.cat ? chip.dataset.cat : null;
      setCategory(cat);
      gsap.fromTo(chip, { scale: 1 }, {
        scale: 1.2, duration: 0.12, yoyo: true, repeat: 1, ease: 'power2.out',
        onComplete: () => closePicker(),
      });
    });

    updateFab();
  </script>
</body>
</html>
